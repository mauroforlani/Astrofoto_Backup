headers = {"User-Agent": "Mozilla/5.0 (AstrofotoTool/1.0)"}

ok, fail = 0, 0
for obj_id, url in IMGS.items():
    dest = f"img/{obj_id}.jpg"
    if os.path.exists(dest):
        print(f"  skip  {obj_id} (già presente)")
        ok += 1
        continue
    try:
        req = urllib.request.Request(url, headers=headers)
        with urllib.request.urlopen(req, timeout=15) as r, open(dest, "wb") as f:
            f.write(r.read())
        print(f"  ✓  {obj_id}")
        ok += 1
    except Exception as e:
        print(f"  ✗  {obj_id}: {e}")
        fail += 1
    time.sleep(0.3)  # rispetta il rate limit Wikimedia

print(f"\nScaricate: {ok}/{len(IMGS)}  Fallite: {fail}")
print("Cartella 'img/' pronta per l'upload su GitHub.")
