              dest = f"img/{obj_id}.jpg"
              url = BASE + path
              try:
                  req = urllib.request.Request(url, headers=HDR)
                  with urllib.request.urlopen(req, timeout=20) as r:
                      data = r.read()
                  if len(data) > 5000:
                      with open(dest, "wb") as f:
                          f.write(data)
                      print(f"  ✓ {obj_id} ({len(data)//1024}KB)")
                      ok += 1
                  else:
                      print(f"  ✗ {obj_id} - too small ({len(data)} bytes)")
                      fail += 1
              except Exception as e:
                  print(f"  ✗ {obj_id} - {e}")
                  fail += 1
              time.sleep(0.4)

          print(f"\nOK: {ok}  Fallite: {fail}")
          PYEOF

      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img/
          git diff --staged --quiet || git commit -m "Astro images v2 [automated]"
          git push
