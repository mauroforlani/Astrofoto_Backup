name: Download Astro Images

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - run: mkdir -p assets/images

      - run: curl -L https://upload.wikimedia.org/wikipedia/commons/d/d2/Orion_Nebula_-_Hubble_2006_mosaic_18000.jpg -o assets/images/m42.jpg || true

      - run: curl -L https://upload.wikimedia.org/wikipedia/commons/a/a4/Andromeda_Galaxy_(with_h-alpha).jpg -o assets/images/m31.jpg || true

      - run: curl -L https://upload.wikimedia.org/wikipedia/commons/4/4e/Pleiades_large.jpg -o assets/images/m45.jpg || true

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add assets/images
          git commit -m "Auto download astro images" || true
          git push
